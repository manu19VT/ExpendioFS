<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ventas - Expendio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Ventas</h1>
      <a href="index.html" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>
    <div class="card p-4 shadow-sm mb-4">
      <form id="formventas">
        <h5 id="formTitle">Agregar Registro</h5>
        <div class="row">
          <div class="col-md-3 mb-3"><input type="text" id="id" class="form-control" placeholder="id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="sucursal_id" class="form-control" placeholder="sucursal id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="empleado_id" class="form-control" placeholder="empleado id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="cliente_id" class="form-control" placeholder="cliente id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="folio" class="form-control" placeholder="folio" required></div>
          <div class="col-md-3 mb-3"><input type="date" id="fecha_venta" class="form-control" placeholder="fecha venta" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="metodo_pago" class="form-control" placeholder="metodo pago" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="subtotal" class="form-control" placeholder="subtotal" required></div>
        </div>
         <button type="button" class="btn btn-secondary d-none" id="btnCancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
      </form>
    </div>
    <div class="table-responsive">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>id</th><th>sucursal_id</th><th>empleado_id</th><th>cliente_id</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <script src="/js/ventas.js"></script>
</body>
</html>
