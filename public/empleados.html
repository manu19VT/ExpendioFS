<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Empleados - Expendio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Empleados</h1>
      <a href="index.html" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>
    <div class="card p-4 shadow-sm mb-4">
      <form id="formempleados">
        <h5 id="formTitle">Agregar Registro</h5>
        <div class="row">
          <div class="col-md-3 mb-3"><input type="text" id="id" class="form-control" placeholder="id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="sucursal_id" class="form-control" placeholder="sucursal id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="nombre" class="form-control" placeholder="nombre" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="apellido_paterno" class="form-control" placeholder="apellido paterno" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="apellido_materno" class="form-control" placeholder="apellido materno" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="puesto" class="form-control" placeholder="puesto" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="telefono" class="form-control" placeholder="telefono" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="email" class="form-control" placeholder="email" required></div>
          <div class="col-md-3 mb-3"><input type="date" id="fecha_ingreso" class="form-control" placeholder="fecha ingreso" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="salario" class="form-control" placeholder="salario" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="turno" class="form-control" placeholder="turno" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="estatus" class="form-control" placeholder="estatus" required></div>
        </div>
         <button type="button" class="btn btn-secondary d-none" id="btnCancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
      </form>
    </div>
    <div class="table-responsive">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>id</th><th>sucursal_id</th><th>nombre</th><th>apellido_paterno</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <script src="/js/empleados.js"></script>
</body>
</html>
