<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clientes - Expendio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Clientes</h1>
      <a href="index.html" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>
    <div class="card p-4 shadow-sm mb-4">
      <form id="formclientes">
        <h5 id="formTitle">Agregar Registro</h5>
        <div class="row">
          <div class="col-md-3 mb-3"><input type="text" id="id" class="form-control" placeholder="id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="nombre" class="form-control" placeholder="nombre" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="apellido_paterno" class="form-control" placeholder="apellido paterno" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="apellido_materno" class="form-control" placeholder="apellido materno" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="telefono" class="form-control" placeholder="telefono" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="email" class="form-control" placeholder="email" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="calle" class="form-control" placeholder="calle" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="numero" class="form-control" placeholder="numero" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="colonia" class="form-control" placeholder="colonia" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="ciudad" class="form-control" placeholder="ciudad" required></div>
          <div class="col-md-3 mb-3"><input type="date" id="fecha_registro" class="form-control" placeholder="fecha registro" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="puntos" class="form-control" placeholder="puntos" required></div>
        </div>
         <button type="button" class="btn btn-secondary d-none" id="btnCancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
      </form>
    </div>
    <div class="table-responsive">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>id</th><th>nombre</th><th>apellido_paterno</th><th>apellido_materno</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <script src="/js/clientes.js"></script>
</body>
</html>
