<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - Expendio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Gestión de Productos</h1>
      <a href="index.html" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>
    <div class="card p-4 shadow-sm mb-4">
      <form id="formproductos">
        <h5 id="formTitle">Agregar Registro</h5>
        <div class="row">
          <div class="col-md-3 mb-3"><input type="text" id="id" class="form-control" placeholder="id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="proveedor_id" class="form-control" placeholder="proveedor id" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="categoria" class="form-control" placeholder="categoria" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="codigo_barras" class="form-control" placeholder="codigo barras" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="nombre" class="form-control" placeholder="nombre" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="descripcion" class="form-control" placeholder="descripcion" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="marca" class="form-control" placeholder="marca" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="unidad_medida" class="form-control" placeholder="unidad medida" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="costo" class="form-control" placeholder="costo" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="precio" class="form-control" placeholder="precio" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="stock" class="form-control" placeholder="stock" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="stock_minimo" class="form-control" placeholder="stock minimo" required></div>
          <div class="col-md-3 mb-3"><input type="date" id="fecha_caducidad" class="form-control" placeholder="fecha caducidad" required></div>
          <div class="col-md-3 mb-3"><input type="text" id="activo" class="form-control" placeholder="activo" required></div>
        </div>
         <button type="button" class="btn btn-secondary d-none" id="btnCancel">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnSave">Guardar</button>
      </form>
    </div>
    <div class="table-responsive">
      <table class="table table-striped">
        <thead class="table-dark">
          <tr>
            <th>id</th><th>proveedor_id</th><th>categoria</th><th>codigo_barras</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <script src="/js/productos.js"></script>
</body>
</html>
