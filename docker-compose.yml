version: '3.8'
services:
  app:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=expendio_bebidas
    depends_on:
      - db
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=expendio_bebidas
    volumes:
      - db_data:/var/lib/mysql
      - ./expendio_bebidas.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: